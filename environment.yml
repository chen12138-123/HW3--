  - pip
  - pip:
    - plyfile==1.0.3
    - tqdm==4.66.1
    - imageio==2.33.1
    - imageio-ffmpeg==0.4.9
    - opencv-python==4.9.0.80
    - matplotlib==3.8.2
    - pillow>=9.3.0
    - reportlab>=4.0.0
    - open3d==0.18.0
    - trimesh==4.0.5
    - wandb==0.16.1
    - swanlab==0.1.5
